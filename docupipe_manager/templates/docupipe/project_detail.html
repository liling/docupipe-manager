{% extends "base.html" %}
{% block title %}{{ "创建项目" if mode == "new" else "项目详情" }}{% endblock %}
{% block content %}
<div data-project-id="{{ project_id or '' }}" data-mode="{{ mode }}" data-current-user-id="{{ current_user.id }}">
  {% if mode == "new" %}
  <div class="content-header"><h2>创建项目</h2></div>
  <form id="project-form" class="card" style="max-width:520px">
    <div class="form-group">
      <label>项目名</label>
      <input name="name" placeholder="项目名" class="form-control" required>
    </div>
    <div class="form-group">
      <label>slug</label>
      <input name="slug" placeholder="slug (a-z0-9-)" pattern="[a-z0-9-]+" class="form-control" required>
      <span class="text-muted">URL 中使用的唯一标识，只能包含小写字母、数字、横线。</span>
    </div>
    <div class="form-group">
      <label>描述（可选）</label>
      <textarea name="description" placeholder="描述（可选）" class="form-control"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary">创建</button>
    </div>
  </form>
  <script>
    document.getElementById("project-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const body = Object.fromEntries(f.entries());
      const r = await fetch(`${API_PREFIX}/admin/api/projects`, {
        method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body),
      });
      if (r.ok) { const j = await r.json(); location.href = `/docupipe/projects/${j.id}`; }
      else { alert((await r.json()).detail || "创建失败"); }
    });
  </script>
  {% else %}
  <div class="content-header">
    <h2><span id="proj-name">加载中...</span> <span id="proj-status" class="status-tag"></span></h2>
    <div class="content-header-actions">
      <a href="/docupipe/projects" class="btn btn-secondary">返回列表</a>
    </div>
  </div>
  <div class="tabs">
    <button class="tab tab-active" data-tab="tasks">任务</button>
    <button class="tab" data-tab="env-vars">环境变量</button>
    <button class="tab" data-tab="credentials">凭证</button>
    <button class="tab" data-tab="members">成员</button>
    <button class="tab" data-tab="runs">运行历史</button>
  </div>
  <div id="tab-tasks" class="tab-panel"></div>
  <div id="tab-env-vars" class="tab-panel hidden"></div>
  <div id="tab-credentials" class="tab-panel hidden"></div>
  <div id="tab-members" class="tab-panel hidden"></div>
  <div id="tab-runs" class="tab-panel hidden"></div>
  <script src="/docupipe/static/js/project_detail.js"></script>
  <dialog id="member-add-dialog">
    <h3 style="margin:0 0 16px">添加成员</h3>
    <form id="member-add-form">
      <div class="form-group">
        <label>用户名</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="member-lookup-input" class="form-control" placeholder="输入用户名" autocomplete="off" style="flex:1">
          <button type="button" class="btn btn-secondary" id="member-lookup-btn">查找</button>
        </div>
      </div>
      <div id="member-preview" class="member-preview" style="display:none"></div>
      <div class="form-group">
        <label>角色</label>
        <select id="member-role-select" class="form-control">
          <option value="member" selected>member</option>
          <option value="owner">owner</option>
        </select>
      </div>
      <input type="hidden" id="member-lookup-id">
      <div class="form-actions" style="margin-top:16px">
        <button type="submit" id="member-add-submit" class="btn btn-sm btn-primary" disabled>添加</button>
        <button type="button" class="btn btn-sm btn-secondary" id="member-cancel-btn">取消</button>
      </div>
    </form>
  </dialog>
  {% endif %}
</div>
<script>
function activateTab(name) {
  const btn = document.querySelector(`.tab[data-tab="${name}"]`);
  if (!btn) name = "tasks";
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("tab-active"));
  document.querySelectorAll(".tab-panel").forEach(x => x.classList.add("hidden"));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add("tab-active");
  document.getElementById("tab-" + name).classList.remove("hidden");
}
activateTab((location.hash || "#tasks").slice(1));
document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => {
  activateTab(b.dataset.tab);
  location.hash = b.dataset.tab;
}));

// Bind member-add-dialog handlers via addEventListener (no inline handlers)
// Guard with ?. so the create-project page (mode=new, no dialog) doesn't throw
document.getElementById("member-add-form")?.addEventListener("submit", confirmAddMember);
document.getElementById("member-lookup-btn")?.addEventListener("click", lookupMember);
document.getElementById("member-lookup-input")?.addEventListener("input", onMemberLookupInput);
document.getElementById("member-cancel-btn")?.addEventListener("click", hideMemberAddDialog);
</script>
{% endblock %}
