{% extends "base.html" %}
{% block title %}{{ "编辑任务" if task_id else "新建任务" }}{% endblock %}
{% block content %}
<div data-project-id="{{ project_id }}" data-task-id="{{ task_id or '' }}">
  <div class="content-header"><h2>{{ '编辑任务' if task_id else '新建任务' }}</h2></div>
  <form id="task-form" class="card" style="max-width:680px">
    <div class="form-group">
      <label>任务名</label>
      <input name="name" placeholder="任务名" class="form-control" required>
    </div>
    <div class="form-group">
      <label>slug</label>
      <input name="slug" placeholder="slug (a-z0-9-)" pattern="[a-z0-9-]+" class="form-control" required>
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea name="description" placeholder="描述" class="form-control"></textarea>
    </div>
    <div class="form-group">
      <label>config.yaml</label>
      <textarea name="config_yaml" rows="12" class="form-control input-mono" required>pipelines:
  - name: default</textarea>
    </div>
    <div class="form-group">
      <label>凭证</label>
      <select name="credential_id" class="form-control"><option value="">（无）</option></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>调度 cron</label>
        <input name="schedule_cron" placeholder="如 0 3 * * *" class="form-control">
      </div>
      <div class="form-group">
        <label>调度模式</label>
        <select name="schedule_mode" class="form-control">
          <option value="incremental">incremental</option>
          <option value="full">full</option>
          <option value="mirror">mirror</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>pipeline 名（可选）</label>
      <input name="schedule_pipeline" placeholder="pipeline 名（可选）" class="form-control">
    </div>
    <div class="form-group">
      <label class="check-row"><input type="checkbox" name="schedule_enabled" checked> 启用调度</label>
    </div>
    <input type="hidden" name="credential_type" value="dws">
    <div class="form-actions">
      <button class="btn btn-primary">保存</button>
      <a class="btn btn-secondary" href="/docupipe/projects/{{ project_id }}">取消</a>
    </div>
  </form>
</div>
<script src="/static/js/task_form.js"></script>
{% endblock %}
