{% extends "base.html" %}
{% block title %}项目{% endblock %}
{% block content %}
<div class="content-header">
    <h2>项目</h2>
    <div class="content-header-actions">
        {% if current_user.role == "admin" %}
        <a href="/docupipe/projects/new" class="btn btn-primary">创建项目</a>
        {% endif %}
    </div>
</div>

<div id="project-list" class="stack">
    <div class="empty-state">加载中...</div>
</div>
<script>
async function loadProjects() {
  const r = await fetch(`${API_PREFIX}/api/projects`);
  const projects = await r.json();
  const box = document.getElementById("project-list");
  if (!projects.length) {
    DP.fill(box, DP.el("div", {class: "empty-state", text: "暂无可见的项目。"}));
    return;
  }
  DP.fill(box, projects.map(p => DP.el("a", {href: `/docupipe/projects/${p.id}`, class: "card-row"},
    DP.el("div", {class: "card-row-main"},
      DP.el("div", {}, DP.el("span", {class: "card-row-title", text: p.name})),
      p.description ? DP.el("div", {class: "card-row-meta", text: p.description}) : null
    ),
    DP.el("span", {class: `status-tag ${p.status === 'active' ? 'is-success' : ''}`, text: p.status})
  )));
}
loadProjects();
</script>
{% endblock %}
