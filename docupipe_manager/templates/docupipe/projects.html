{% extends "base.html" %}
{% block title %}项目{% endblock %}
{% block content %}
<div class="content-header">
    <h2>项目</h2>
    <div class="content-header-actions">
        {% if current_user.role == "admin" %}
        <a href="/docupipe/projects/new" class="btn btn-primary">创建项目</a>
        {% endif %}
    </div>
</div>

<div id="project-list" class="stack">
    <div class="empty-state">加载中...</div>
</div>
<script>
async function loadProjects() {
  const r = await fetch(`${API_PREFIX}/api/projects`);
  const projects = await r.json();
  const box = document.getElementById("project-list");
  if (!projects.length) {
    box.innerHTML = '<div class="empty-state">暂无可见的项目。</div>';
    return;
  }
  box.innerHTML = projects.map(p => `
    <a href="/docupipe/projects/${p.id}" class="card-row">
      <div class="card-row-main">
        <div><span class="card-row-title">${p.name}</span></div>
        ${p.description ? `<div class="card-row-meta">${p.description}</div>` : ""}
      </div>
      <span class="status-tag ${p.status === 'active' ? 'is-success' : ''}">${p.status}</span>
    </a>`).join("");
}
loadProjects();
</script>
{% endblock %}
