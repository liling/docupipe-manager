{% extends "base.html" %}
{% block title %}调度计划{% endblock %}
{% block content %}
<div class="content-header">
    <h2>调度计划</h2>
</div>

<div id="sched-summary" class="card-row-meta">加载中...</div>
<div id="schedules-list">
    <div class="empty-state">加载中...</div>
</div>
<script>
function kindTag(k) {
  return k === "keepalive" ? "Keepalive" : "Task";
}
function statusCell(s) {
  if (!s.registered) return DP.el("span", {class: "status-tag is-failed", text: "未注册"});
  if (s.next_run_time === null) return DP.el("span", {class: "status-tag is-running", text: "已暂停"});
  return DP.el("span", {class: "status-tag is-success", text: "启用"});
}
function relTime(iso) {
  if (!iso) return "—";
  var d = new Date(iso);
  var diff = d - new Date();
  var h = Math.round(diff / 3600000);
  if (h <= 0) return "即将执行";
  if (h < 24) return h + " 小时后";
  return Math.round(h / 24) + " 天后";
}
function contextCell(s) {
  if (s.kind === "task") {
    var p = s.context.project_name
      ? DP.el("a", {href: "/docupipe/projects/" + s.context.project_id, text: s.context.project_name})
      : "—";
    return [p, " / ", s.context.task_name || "—"];
  }
  return ["凭证：", s.context.credential_name || "—", "（", s.context.credential_status, "）"];
}

async function loadSchedules() {
  var box = document.getElementById("schedules-list");
  var sum = document.getElementById("sched-summary");
  var r = await fetch(API_PREFIX + "/api/schedules");
  if (!r.ok) {
    DP.fill(box, DP.el("div", {class: "empty-state", text: r.status === 403 ? "需要管理员权限。" : "加载失败"}));
    sum.textContent = "";
    return;
  }
  var data = await r.json();
  var taskN = data.schedules.filter(function(s) { return s.kind === "task"; }).length;
  var kaN = data.schedules.length - taskN;
  var cronNote = data.keepalive_enabled
    ? "全局 keepalive cron: " + data.keepalive_cron
    : "keepalive 未启用";
  sum.textContent = taskN + " 个 Task 调度 · " + kaN + " 个 Keepalive 调度 · " + cronNote;

  if (!data.schedules.length) {
    DP.fill(box, DP.el("div", {class: "empty-state", text: "暂无调度。"}));
    return;
  }
  var rows = data.schedules.map(function(s) {
    var timeCell;
    if (s.next_run_time) {
      timeCell = DP.el("td", {},
        document.createTextNode(new Date(s.next_run_time).toLocaleString("zh-CN", {timeZone: "Asia/Shanghai"})),
        DP.el("br"),
        DP.el("span", {class: "card-row-meta-inline", text: relTime(s.next_run_time)})
      );
    } else {
      timeCell = DP.el("td", {text: "—"});
    }
    return DP.el("tr", {},
      DP.el("td", {text: kindTag(s.kind)}),
      DP.el("td", {text: s.name}),
      DP.el("td", {}, contextCell(s)),
      DP.el("td", {}, DP.el("code", {text: s.cron})),
      timeCell,
      DP.el("td", {}, statusCell(s))
    );
  });

  DP.fill(box,
    DP.el("table", {class: "data-table"},
      DP.el("thead", {}, DP.el("tr", {},
        ["类型","名称","所属","Cron","下次执行","状态"].map(function(h){ return DP.el("th",{text:h}); })
      )),
      DP.el("tbody", {}, rows)
    )
  );
}

loadSchedules();
</script>
{% endblock %}
