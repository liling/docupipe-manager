services:
  docupipe-manager:
    build:
      context: ..
      dockerfile: docupipe-manager/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - ./data:/var/lib/docupipe-manager
    networks:
      - default
      - hindsight_default

networks:
  hindsight_default:
    external: true
